{{- if and ((.Values.builder).kaniko).enabled (.Values.api).enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ir-engine.builder.kaniko.fullname" . }}-api
  labels:
    {{- include "ir-engine.builder.kaniko.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ir-engine.kaniko.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ir-engine.builder.kaniko.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/api-server-configmap.yaml") . | sha256sum }}
    spec:
    {{- with .Values.builder.kaniko.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    serviceAccountName: {{ include "ir-engine.builder.kaniko.serviceAccountName" . }}
    securityContext:
      {{- toYaml .Values.builder.kaniko.podSecurityContext | nindent 8 }}
    {{- $releaseName := .Release.Name }}
    {{ if not (empty .Values.release) }}
    {{- $releaseName = .Values.release.name | default .Release.Name }}
    {{ end }}
    containers:
      - name: {{ .Chart.Name }}-api
        securityContext:
          {{- toYaml .Values.builder.kaniko.securityContext | nindent 12 }}
        image: "bitnami/kaniko:{{ .Values.builder.kaniko.image.tag }}"
        imagePullPolicy: IfNotPresent
        args: [
          "--cache=true",
          "--cache-run-layer=true",
          "--cache-copy-layers=true",
          "--dockerfile=/app/dockerfiles/api/Dockerfile-api",
          "--context=${{ .Values.builder.kaniko.context_repo }}/builder-context-${{ builder.extraEnv.START_TIME }}.tar.gz",
          "--destination=${{ .Values.builder.extraEnv.DESTINATION_REPO_URL }}/${{ .Values.builder.extraEnv.DESTINATION_REPO_NAME }}:${{ .Values.builder.extraEnv.TAG }}_${{ .Values.builder.extraEnv.START_TIME }}"
          "--destination=${{ .Values.builder.extraEnv.DESTINATION_REPO_URL }}/${{ .Values.builder.extraEnv.DESTINATION_REPO_NAME }}:latest_api"
        ]
        restartPolicy: Never
        envFrom:
          - configMapRef:
              name: {{ include "ir-engine.builder.kaniko.fullname" . }}
              optional: true
        env:
          - name: RELEASE_NAME
            value: {{ $releaseName }}
          - name: SERVICE
            value: api
          - name: BUILDER_REPOSITORY
            value: {{ .Values.builder.image.repository }}
          # GOOGLE_PROJECT_ID will be an empty string if deployed on AWS
          - name: GOOGLE_PROJECT_ID
            value: {{ .Values.googleProjectID }}
          - name: NAMESPACE
            value: {{ .Release.Namespace }}
        volumeMounts:
          - name: kaniko-secret
            mountPath: /kaniko/.docker
          - name: dockerfile-storage
            mountPath: /workspace
        volumes:
          - name: kaniko-secret
            secret:
              secretName: regcred
              items:
                - key: .dockerconfigjson
                  path: config.json
          - name: dockerfile-storage
            persistentVolumeClaim:
              claimName: dockerfile-claim
        {{- with .Values.builder.kaniko.nodeSelector }}
        nodeSelector:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.builder.kaniko.affinity }}
        affinity:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.builder.kaniko.tolerations }}
        tolerations:
          {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- end }}
